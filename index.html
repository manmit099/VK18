<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Virat Kohli Sixes</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      min-height: 100vh;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      color: #d4d4d4;
      padding: 32px 28px;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: .16em;
      color: #444;
      text-transform: uppercase;
      padding: 0 4px 12px;
      user-select: none;
    }

    .folder-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 6px;
      cursor: pointer;
      user-select: none;
      border-radius: 3px;
      transition: background .12s;
    }
    .folder-row:hover { background: #111; }

    .arrow {
      width: 14px; height: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      color: #555;
      transition: transform .18s ease;
      transform: rotate(-90deg);
    }
    .arrow.open { transform: rotate(0deg); }

    .f-icon { width: 16px; height: 16px; flex-shrink: 0; display: block; }

    .row-name {
      font-size: 13px;
      color: #ccc;
      letter-spacing: .01em;
    }

    .children {
      display: none;
      padding-left: 34px;
      border-left: 1px solid #1a1a1a;
      margin-left: 13px;
    }
    .children.open { display: block; }

    .file-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 6px;
      cursor: pointer;
      user-select: none;
      border-radius: 3px;
      transition: background .12s;
    }
    .file-row:hover { background: #111; }
    .file-row .row-name { font-size: 12.5px; color: #777; }
    .file-row.active { background: #1a0000; border-left: 2px solid #cc0000; padding-left: 4px; }

    /* ── Modal overlay ── */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn .18s ease;
    }
    #modal.open { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Modal card ── */
    .modal-card {
      background: #0d0d0d;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      box-shadow: 0 0 60px rgba(204, 0, 0, 0.2), 0 24px 60px rgba(0,0,0,0.8);
      width: 100%;
      max-width: 360px;
      overflow: hidden;
      animation: slideUp .2s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    /* Header bar */
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid #1a1a1a;
      background: #111;
    }
    .modal-title {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: #555;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .close-btn {
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      color: #555;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      transition: background .12s, color .12s;
    }
    .close-btn:hover { background: #cc0000; color: #fff; border-color: #cc0000; }

    /* Video — 9:16 portrait */
    .modal-video-wrap {
      width: 100%;
      aspect-ratio: 9 / 16;
      background: #000;
      position: relative;
    }
    .modal-video-wrap video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      display: block;
    }

    /* Footer */
    .modal-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-top: 1px solid #1a1a1a;
      background: #0d0d0d;
      gap: 10px;
    }
    .modal-filename {
      font-size: 10px;
      color: #333;
      letter-spacing: .06em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .download-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: #cc0000;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: .08em;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      transition: background .15s;
      flex-shrink: 0;
    }
    .download-btn:hover { background: #e60000; }
  </style>
</head>
<body>

  <div class="section-label">Virat Kohli Sixes</div>
  <div id="tree"></div>

  <!-- ── Modal popup ── -->
  <div id="modal">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-title">
          <svg width="12" height="12" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="3" width="14" height="10" rx="1.5" fill="#cc0000" opacity=".9"/>
            <polygon points="6,6 11,8 6,10" fill="white"/>
          </svg>
          <span id="modal-title-text"></span>
        </div>
        <div class="close-btn" id="close-btn" title="Close">✕</div>
      </div>

      <div class="modal-video-wrap">
        <video
          id="modal-video"
          controls
          autoplay
          preload="auto"
          playsinline
          controlslist="nodownload"
        >
          <source id="modal-src" src="" type="video/mp4">
        </video>
      </div>

      <div class="modal-footer">
        <span class="modal-filename" id="modal-filename"></span>
        <a class="download-btn" id="download-btn" href="" download="">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download
        </a>
      </div>
    </div>
  </div>

<script>
  const folders = [
    { name: 'Rcb Vs Srh',  videos: ['1RcbVsSrh','2RcbVsSrh','3RcbVsSrh','4RcbVsSrh','5RcbVsSrh'] },
    { name: 'Rcb Vs Csk',  videos: [] },
    { name: 'Rcb Vs Mi',   videos: [] },
    { name: 'Rcb Vs Pbks', videos: [] },
    { name: 'Rcb Vs Lsg',  videos: [] },
  ];

  const folderSVG = (open) => `
    <svg class="f-icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
      <path d="M1 3.5A1.5 1.5 0 0 1 2.5 2h3.086a1.5 1.5 0 0 1 1.06.44l.915.914A1.5 1.5 0 0 0 8.62 3.5H13.5A1.5 1.5 0 0 1 15 5v7.5A1.5 1.5 0 0 1 13.5 14h-11A1.5 1.5 0 0 1 1 12.5V3.5z"
            fill="${open ? '#f5c842' : '#c8901a'}"/>
    </svg>`;

  const videoSVG = () => `
    <svg class="f-icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="3" width="14" height="10" rx="1.5" fill="#cc0000" opacity=".9"/>
      <polygon points="6,6 11,8 6,10" fill="white"/>
    </svg>`;

  const arrowSVG = () => `
    <svg width="9" height="9" viewBox="0 0 9 9" fill="none" stroke="currentColor" stroke-width="1.7">
      <polyline points="1.5,3 4.5,6 7.5,3"/>
    </svg>`;

  // ── Build tree ──
  const tree = document.getElementById('tree');
  folders.forEach(folder => {
    let open = false;
    const wrap = document.createElement('div');

    const row = document.createElement('div');
    row.className = 'folder-row';

    const arrow = document.createElement('span');
    arrow.className = 'arrow';
    arrow.innerHTML = arrowSVG();

    const icon = document.createElement('span');
    icon.innerHTML = folderSVG(false);

    const label = document.createElement('span');
    label.className = 'row-name';
    label.textContent = folder.name;

    row.appendChild(arrow); row.appendChild(icon); row.appendChild(label);

    const children = document.createElement('div');
    children.className = 'children';

    folder.videos.forEach(v => {
      const file = document.createElement('div');
      file.className = 'file-row';
      file.innerHTML = `${videoSVG()}<span class="row-name">${v}.mp4</span>`;
      file.addEventListener('click', () => openModal(v));
      children.appendChild(file);
    });

    row.addEventListener('click', () => {
      open = !open;
      arrow.classList.toggle('open', open);
      children.classList.toggle('open', open);
      icon.innerHTML = folderSVG(open);
    });

    wrap.appendChild(row);
    wrap.appendChild(children);
    tree.appendChild(wrap);
  });

  // ── Modal logic ──
  const modal      = document.getElementById('modal');
  const modalVideo = document.getElementById('modal-video');
  const modalSrc   = document.getElementById('modal-src');
  const titleText  = document.getElementById('modal-title-text');
  const filename   = document.getElementById('modal-filename');
  const dlBtn      = document.getElementById('download-btn');
  const closeBtn   = document.getElementById('close-btn');

  function openModal(name) {
    const src = name + '.mp4';

    // Update video source
    modalSrc.src = src;
    modalVideo.load();
    modalVideo.play();

    // Update labels & download link
    titleText.textContent = src;
    filename.textContent  = src;
    dlBtn.href            = src;
    dlBtn.download        = src;

    // Highlight active row
    document.querySelectorAll('.file-row').forEach(r => {
      r.classList.toggle('active', r.querySelector('.row-name').textContent === src);
    });

    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    modal.classList.remove('open');
    modalVideo.pause();
    modalSrc.src = '';
    modalVideo.load();
    document.body.style.overflow = '';
  }

  closeBtn.addEventListener('click', closeModal);

  // Click backdrop to close
  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
  });

  // Esc key to close
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });
</script>

</body>
</html>
