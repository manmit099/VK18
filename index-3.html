<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Virat Kohli Sixes</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      min-height: 100vh;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      color: #d4d4d4;
      padding: 32px 28px;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: .16em;
      color: #444;
      text-transform: uppercase;
      padding: 0 4px 12px;
      user-select: none;
    }

    /* Folder row */
    .folder-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 6px;
      cursor: pointer;
      user-select: none;
      border-radius: 3px;
      transition: background .12s;
    }
    .folder-row:hover { background: #111; }

    /* Down arrow — rotates to right when closed */
    .arrow {
      width: 14px;
      height: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #555;
      transition: transform .18s ease;
      /* default = pointing right (collapsed) */
      transform: rotate(-90deg);
    }
    .arrow.open {
      /* pointing down (expanded) */
      transform: rotate(0deg);
    }

    .f-icon { width: 16px; height: 16px; flex-shrink: 0; display: block; }

    .row-name {
      font-size: 13px;
      color: #ccc;
      letter-spacing: .01em;
    }

    /* Children */
    .children {
      display: none;
      padding-left: 34px;
      border-left: 1px solid #1a1a1a;
      margin-left: 13px;
    }
    .children.open { display: block; }

    /* File row */
    .file-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 6px;
      cursor: pointer;
      user-select: none;
      border-radius: 3px;
      transition: background .12s;
    }
    .file-row:hover { background: #111; }
    .file-row .row-name { font-size: 12.5px; color: #777; }
  </style>
</head>
<body>

  <div class="section-label">Virat Kohli Sixes</div>
  <div id="tree"></div>

<script>
  const folders = [
    {
      name: 'Rcb Vs Srh',
      id: 'srh',
      videos: ['1RcbVsSrh','2RcbVsSrh','3RcbVsSrh','4RcbVsSrh','5RcbVsSrh']
    },
    { name: 'Rcb Vs Csk', id: 'csk', videos: [] },
    { name: 'Rcb Vs Mi',  id: 'mi',  videos: [] },
    { name: 'Rcb Vs Pbks',id: 'pbks',videos: [] },
    { name: 'Rcb Vs Lsg', id: 'lsg', videos: [] },
  ];

  const folderSVG = (open) => `
    <svg class="f-icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
      <path d="M1 3.5A1.5 1.5 0 0 1 2.5 2h3.086a1.5 1.5 0 0 1 1.06.44l.915.914A1.5 1.5 0 0 0 8.62 3.5H13.5A1.5 1.5 0 0 1 15 5v7.5A1.5 1.5 0 0 1 13.5 14h-11A1.5 1.5 0 0 1 1 12.5V3.5z"
            fill="${open ? '#f5c842' : '#c8901a'}"/>
    </svg>`;

  const videoSVG = () => `
    <svg class="f-icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="3" width="14" height="10" rx="1.5" fill="#cc0000" opacity=".9"/>
      <polygon points="6,6 11,8 6,10" fill="white"/>
    </svg>`;

  const downArrowSVG = () => `
    <svg width="9" height="9" viewBox="0 0 9 9" fill="none" stroke="currentColor" stroke-width="1.7">
      <polyline points="1.5,3 4.5,6 7.5,3"/>
    </svg>`;

  const tree = document.getElementById('tree');

  folders.forEach(folder => {
    let open = false;
    const wrap = document.createElement('div');

    /* — Folder row — */
    const row = document.createElement('div');
    row.className = 'folder-row';

    const arrow = document.createElement('span');
    arrow.className = 'arrow'; // starts rotated -90deg = pointing right
    arrow.innerHTML = downArrowSVG();

    const icon = document.createElement('span');
    icon.innerHTML = folderSVG(false);

    const label = document.createElement('span');
    label.className = 'row-name';
    label.textContent = folder.name;

    row.appendChild(arrow);
    row.appendChild(icon);
    row.appendChild(label);

    /* — Children — */
    const children = document.createElement('div');
    children.className = 'children';

    folder.videos.forEach(v => {
      const file = document.createElement('div');
      file.className = 'file-row';
      file.innerHTML = `${videoSVG()}<span class="row-name">${v}.mp4</span>`;
      children.appendChild(file);
    });

    /* — Toggle — */
    row.addEventListener('click', () => {
      open = !open;
      arrow.classList.toggle('open', open);
      children.classList.toggle('open', open);
      icon.innerHTML = folderSVG(open);
    });

    wrap.appendChild(row);
    wrap.appendChild(children);
    tree.appendChild(wrap);
  });
</script>

</body>
</html>
